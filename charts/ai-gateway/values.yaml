# Default values for ai-gateway.
# Override with: helm install ferrogw ferro-labs/ai-gateway -f my-values.yaml

replicaCount: 2

image:
  repository: ghcr.io/ferro-labs/ai-gateway
  pullPolicy: IfNotPresent
  # Overrides the image tag; defaults to .Chart.AppVersion when empty.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Create a dedicated ServiceAccount for the gateway pods.
  create: true
  # Annotations to add to the ServiceAccount (e.g. for IRSA / Workload Identity).
  annotations: {}
  # Override the auto-generated name.
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
  hosts:
    - host: gateway.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: ferrogw-tls
  #   hosts:
  #     - gateway.example.com

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

# ---------------------------------------------------------------------------
# Gateway configuration — rendered into a ConfigMap and mounted at
# /etc/ferrogw/config.yaml inside each pod.
#
# Keys here must match the gateway's config schema exactly: since v1.1.22 an
# unknown key is a hard load error. The listen port is NOT a config key — it
# comes from the PORT env var, set from service.targetPort above.
# ---------------------------------------------------------------------------
config:
  strategy:
    mode: fallback

  # Bounds a single non-streaming request end to end — plugin stages, provider
  # call, and every retry and fallback attempt combined (v1.2.0). Omitted means
  # no gateway-imposed deadline.
  # request_timeout: 60s

  # What to do with a parameter the target provider cannot express (v1.2.0):
  # warn (default — log and forward) | drop | reject (400 unsupported_parameter).
  # compatibility:
  #   on_unsupported_param: warn

  targets: []
  # - virtual_key: openai
  #   retry:
  #     attempts: 3
  #     retry_on_status: [429, 502, 503, 504]
  #   # Bound in-flight requests to this provider; overflow sheds with
  #   # 429 provider_saturated rather than queueing without limit (v1.2.0).
  #   concurrency:
  #     max_concurrency: 64
  #     queue_size: 128
  # - virtual_key: anthropic

  plugins: []
  # - name: rate-limit
  #   type: ratelimit
  #   stage: before_request
  #   enabled: true
  #   config:
  #     requests_per_second: 100
  #     burst: 200

  # OpenTelemetry tracing (v1.1.0+). Off by default — a zero-allocation no-op
  # until an OTLP endpoint is configured. ${ENV} values resolve from the Secret.
  # observability:
  #   tracing:
  #     enabled: true
  #     endpoint: "http://otel-collector:4317"   # https:// → TLS; http:// or host:port → plaintext
  #     protocol: grpc                            # grpc | http
  #     sample_ratio: 1.0
  #     privacy_level: metadata                   # none | metadata | full
  #     headers:
  #       authorization: "${OTEL_AUTH_HEADER}"

# ---------------------------------------------------------------------------
# Provider API keys — stored in a Kubernetes Secret.
# Set values via --set or use an external-secrets / sealed-secrets operator.
# ---------------------------------------------------------------------------
secrets:
  # Master credential for /admin and /metrics; required. Mounted as MASTER_KEY.
  # Generate one with `ferrogw init`.
  adminApiKey: ""
  # Map of provider name → API key. Keys are uppercased and suffixed with
  # _API_KEY inside the Secret (e.g. openai → OPENAI_API_KEY).
  providers: {}
  # openai: "sk-..."
  # anthropic: "sk-ant-..."
  # xai: "xai-..."

nodeSelector: {}
tolerations: []
affinity: {}
