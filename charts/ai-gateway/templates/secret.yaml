apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-gateway.fullname" . }}
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.adminApiKey }}
  ADMIN_API_KEY: {{ .Values.secrets.adminApiKey | quote }}
  {{- end }}
  {{- range $provider, $key := .Values.secrets.providers }}
  {{ $provider | upper | replace "-" "_" }}_API_KEY: {{ $key | quote }}
  {{- end }}
